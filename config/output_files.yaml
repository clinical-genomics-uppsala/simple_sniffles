---
directory: "results"
files:
  - name: "sniffles2_vcf"
    input: "cnv_sv/sniffles2_call/{sample}_{type}.vcf.gz"
    output: "cnv_sv/{sample}_{type}.sniffles2.vcf.gz"
  - name: "sniffles2 xlsx report"
    input: "reports/xlsx_reports/{sample}_{type}.sniffles2.xlsx"
    output: "cnv_sv/reports/{sample}_{type}.sniffles2.xlsx"
  - name: "sniffles2 joint vcf"
    input: "cnv_sv/sniffles2_joint/{sample}.vcf.gz"
    output: "cnv_sv/sniffles2_joint/{sample}.sniffles2_joint.vcf.gz"
  - name: "sniffles2 joint vcf tbi"
    input: "cnv_sv/sniffles2_joint/{sample}.vcf.gz.tbi"
    output: "cnv_sv/sniffles2_joint/{sample}.sniffles2_joint.vcf.gz.tbi"
  - name: "sniffles2 joint xlsx report"
    input: "reports/xlsx_reports/{sample}.sniffles2_joint.xlsx"
    output: "cnv_sv/reports/{sample}.sniffles2_joint.xlsx"
