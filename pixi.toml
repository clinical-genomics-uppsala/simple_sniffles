[workspace]
name = "simple_sniffles"
version = "0.1.0"
description = "Sniffles2 SV calling pipeline (hydra-genetics)"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
snakemake = ">=7.32.0,<8"
hydra-genetics = ">=3.0.0"
pandas = ">=2.0"
pysam = ">=0.22"
xlsxwriter = ">=3.1"
pyyaml = ">=6.0"
jsonschema = ">=4.0"

[feature.test.dependencies]
pytest = ">=8.0"

[environments]
default = { features = ["test"] }

[pypi-dependencies]
hydra-genetics = "==4.0.0"
