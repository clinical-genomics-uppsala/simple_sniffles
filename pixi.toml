[workspace]
authors = ["Andrei Guliaev <andrei.guliaev@scilifelab.uu.se>"]
name = "simple_sniffles"
version = "0.1.0"
description = "Sniffles2 SV calling pipeline (hydra-genetics)"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-arm64"]

[tasks]
tests = "PYTHONPATH=. pytest .tests/unit/"
fmt-wf = "snakefmt -l 130 workflow/"
fmt-py="snakefmt -l 130 workflow/scripts/"
fmt-tests="snakefmt -l 130 .tests/unit/"
all-dry = "snakemake --configfile config/config.yaml -n --cores 1"
all-full = "snakemake --configfile config/config.yaml --profile profiles/marvin_cpu"
test-dry = "snakemake --configfiles config/config.yaml config/config_test.yaml -n --cores 1"
test-full = "snakemake --configfiles config/config.yaml config/config_test.yaml --profile profiles/marvin_cpu"

# shared conda dependencies
[dependencies]
python = "3.9.*"
pycodestyle = ">=2.14.0,<3"
pytest = ">=8.4.1,<9"
snakefmt = ">=0.11.0,<0.12"
pre-commit = ">=4.3.0,<5"
pytest-cov = ">=6.2.1,<7"
pandas = ">=2.3.1,<3"
pulp = "<2.8"
tabulate = ">=0.9.0,<0.10"
snakemake-wrapper-utils = ">=0.8.0,<0.9"
networkx = ">=3.2.1,<4"
xlsxwriter = ">=3.2.5,<4"
python-graphviz = ">=0.16,<0.17"
pysam = ">=0.22"
drmaa = "==0.7.9,<0.8"

# shared PyPI dependencies
[pypi-dependencies]
snakemake = ">=7.32.4, <8"
setuptools = "*"
hydra-genetics = "==4.0.0"
